name: Build and Publish Custom OpenFang

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许您在网页上手动点击按钮触发编译

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 授权流水线可以向您的 GitHub Packages 写入镜像
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供的 Token，无需您手动配置

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 仅构建 amd64 架构，完美适配您的绿联 DXP4800S
          platforms: linux/amd64
          # 将这里的镜像名打上您的烙印
          tags: ghcr.io/${{ github.repository_owner }}/openfang-custom:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
